sonar.projectKey=spashx_flutins
sonar.organization=spashx


# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=flutins
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

# Test coverage report generated by: flutter test --coverage
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Disable C/C++/Objective-C analysis for Flutter/Dart projects
sonar.cpp.file.suffixes=-
sonar.c.file.suffixes=-
sonar.objc.file.suffixes=-